name: CI

on:
  pull_request:
    branches:
      - main

  push:
    branches:
      - main

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 24
          java-package: jdk

      - name: Check Java
        run: |
          java -version
          echo $JAVA_HOME
          ls $JAVA_HOME/jmods | head

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run tests
        run: chmod +x gradlew && ./gradlew test

      - name: Build
        run: chmod +x gradlew && ./gradlew build

      - name: Build CLI fat JAR
        run: chmod +x gradlew && ./gradlew :connect4-cli:shadowJar

      - name: Build UI jlink
        run: chmod +x gradlew && ./gradlew :connect4-ui:jlinkZip
